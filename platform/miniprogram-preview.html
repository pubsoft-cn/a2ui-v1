<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小程序端 - 预览界面</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.phone-outer { width: 399px; height: 862px; background: #111; border-radius: 44px; padding: 12px; box-shadow: 0 10px 60px rgba(0,0,0,.5); }
.phone-inner { width: 100%; height: 100%; background: #fff; border-radius: 34px; overflow: hidden; display: flex; flex-direction: column; }

/* Status bar */
.status-bar { height: 44px; background: #ededed; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; }
.status-bar .notch { width: 120px; height: 26px; background: #111; border-radius: 0 0 16px 16px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
.status-bar .time { font-size: 14px; font-weight: 600; margin-top: 8px; }
.status-bar .right-icons { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 12px; display: flex; gap: 4px; margin-top: 4px; }

/* WeChat Nav */
.wx-nav { height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; position: relative; flex-shrink: 0; border-bottom: 1px solid #f0f0f0; }
.wx-nav .back { position: absolute; left: 12px; font-size: 20px; color: #333; }
.wx-nav .title { font-size: 17px; font-weight: 600; }
.wx-nav .capsule { position: absolute; right: 10px; display: flex; border: 1px solid #ddd; border-radius: 16px; overflow: hidden; }
.wx-nav .capsule-btn { width: 32px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 12px; background: rgba(255,255,255,.8); }
.wx-nav .capsule-sep { width: 1px; height: 16px; background: #ddd; align-self: center; }

/* Body */
.wx-body { flex: 1; overflow-y: auto; background: #f5f5f5; }

/* Swiper/Banner */
.banner { width: 100%; height: 200px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; position: relative; }
.banner-emoji { font-size: 60px; }
.banner-dots { position: absolute; bottom: 10px; display: flex; gap: 6px; }
.banner-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.4); }
.banner-dot.active { background: #fff; width: 16px; border-radius: 3px; }

/* Search */
.search-bar { margin: 12px; padding: 10px 16px; background: #fff; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #999; box-shadow: 0 1px 3px rgba(0,0,0,.04); }

/* Category pills */
.categories { display: flex; gap: 8px; padding: 0 12px 12px; overflow-x: auto; }
.cat-pill { padding: 6px 16px; background: #fff; border-radius: 20px; font-size: 12px; white-space: nowrap; flex-shrink: 0; color: #666; }
.cat-pill.active { background: #6c63ff; color: #fff; }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 8px 12px; }
.product-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
.product-img { width: 100%; height: 170px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.product-img.c1 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
.product-img.c2 { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
.product-img.c3 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
.product-img.c4 { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
.product-info { padding: 10px; }
.product-name { font-size: 13px; font-weight: 500; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-meta { display: flex; align-items: baseline; justify-content: space-between; margin-top: 6px; }
.product-price { font-size: 16px; font-weight: 700; color: #e53935; }
.product-price .yen { font-size: 12px; }
.product-sold { font-size: 10px; color: #999; }

/* Tab bar */
.tab-bar { height: 50px; background: #fff; border-top: 1px solid #eee; display: flex; align-items: center; flex-shrink: 0; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; color: #999; }
.tab-item .tab-icon { font-size: 20px; }
.tab-item.active { color: #6c63ff; }
.tab-item.active .tab-icon { color: #6c63ff; }

/* Home indicator */
.home-indicator { height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.home-indicator-bar { width: 100px; height: 4px; background: #111; border-radius: 2px; }
</style>
</head>
<body>

<div class="phone-outer">
  <div class="phone-inner">
    <!-- Status Bar -->
    <div class="status-bar">
      <div class="notch"></div>
      <span class="time">9:41</span>
      <span class="right-icons">
        <span>📶</span><span>📡</span><span>🔋</span>
      </span>
    </div>

    <!-- WeChat Nav -->
    <div class="wx-nav">
      <span class="title">精选商城</span>
      <div class="capsule">
        <div class="capsule-btn">•••</div>
        <div class="capsule-sep"></div>
        <div class="capsule-btn">✕</div>
      </div>
    </div>

    <!-- Body -->
    <div class="wx-body">
      <!-- Banner -->
      <div class="banner">
        <span class="banner-emoji">🛍️</span>
        <div class="banner-dots">
          <div class="banner-dot active"></div>
          <div class="banner-dot"></div>
          <div class="banner-dot"></div>
          <div class="banner-dot"></div>
        </div>
      </div>

      <!-- Search -->
      <div class="search-bar">🔍 搜索商品、品牌</div>

      <!-- Categories -->
      <div class="categories">
        <div class="cat-pill active">推荐</div>
        <div class="cat-pill">数码</div>
        <div class="cat-pill">服饰</div>
        <div class="cat-pill">家居</div>
        <div class="cat-pill">美食</div>
        <div class="cat-pill">运动</div>
      </div>

      <!-- Product Grid -->
      <div class="product-grid">
        <div class="product-card">
          <div class="product-img c1">🎧</div>
          <div class="product-info">
            <div class="product-name">无线蓝牙耳机 Pro Max 高品质音效</div>
            <div class="product-meta">
              <span class="product-price"><span class="yen">¥</span>199</span>
              <span class="product-sold">已售 2.3万</span>
            </div>
          </div>
        </div>
        <div class="product-card">
          <div class="product-img c2">⌚</div>
          <div class="product-info">
            <div class="product-name">智能手表 运动健康监测 超长续航</div>
            <div class="product-meta">
              <span class="product-price"><span class="yen">¥</span>599</span>
              <span class="product-sold">已售 8600</span>
            </div>
          </div>
        </div>
        <div class="product-card">
          <div class="product-img c3">👟</div>
          <div class="product-info">
            <div class="product-name">轻量跑步鞋 透气舒适 缓震回弹</div>
            <div class="product-meta">
              <span class="product-price"><span class="yen">¥</span>329</span>
              <span class="product-sold">已售 1.5万</span>
            </div>
          </div>
        </div>
        <div class="product-card">
          <div class="product-img c4">🎒</div>
          <div class="product-info">
            <div class="product-name">都市通勤双肩包 防水大容量</div>
            <div class="product-meta">
              <span class="product-price"><span class="yen">¥</span>159</span>
              <span class="product-sold">已售 5200</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="tab-item active">
        <span class="tab-icon">🏠</span>
        <span>首页</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">📂</span>
        <span>分类</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">🛒</span>
        <span>购物车</span>
      </div>
      <div class="tab-item">
        <span class="tab-icon">👤</span>
        <span>我的</span>
      </div>
    </div>

    <!-- Home indicator -->
    <div class="home-indicator">
      <div class="home-indicator-bar"></div>
    </div>
  </div>
</div>

</body>
</html>
